<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clear Session - Binee</title>
  <style>
    body { background: #0A0A0F; color: #F0F0F5; font-family: Inter, system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .card { max-width: 420px; text-align: center; padding: 2rem; }
    h1 { font-size: 1.25rem; margin-bottom: 0.5rem; }
    p { color: #A0A0B5; font-size: 0.875rem; line-height: 1.6; }
    button { background: #854DF9; color: white; border: none; padding: 0.625rem 1.5rem; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 500; cursor: pointer; margin-top: 1rem; }
    button:hover { background: #9D6FFA; }
    .done { color: #4ade80; }
    #status { margin-top: 1rem; font-size: 0.8rem; color: #A0A0B5; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Clearing Session</h1>
    <p>Your session cookies grew too large. Clearing them now and redirecting you to sign in.</p>
    <div id="status">Clearing cookies...</div>
    <button onclick="clearAll()" style="display:none" id="retryBtn">Retry Clear &amp; Sign In</button>
  </div>
  <script>
    function clearAll() {
      var status = document.getElementById('status');
      status.innerHTML = 'Clearing cookies...';

      // Step 1: Clear all cookies immediately (no server call needed).
      // The trim-metadata API call would also get 494'd if cookies are too
      // large, so we skip it and just nuke cookies directly.
      var cookies = document.cookie.split(';');
      var cleared = 0;
      for (var i = 0; i < cookies.length; i++) {
        var name = cookies[i].split('=')[0].trim();
        if (name) {
          document.cookie = name + '=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/;';
          document.cookie = name + '=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/; domain=' + location.hostname + ';';
          document.cookie = name + '=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/; domain=.' + location.hostname + ';';
          cleared++;
        }
      }

      // Step 2: Clear localStorage/sessionStorage auth data
      try {
        Object.keys(localStorage).forEach(function(key) {
          if (key.startsWith('sb-') || key.includes('supabase') || key.startsWith('binee_')) {
            localStorage.removeItem(key);
          }
        });
        Object.keys(sessionStorage).forEach(function(key) {
          if (key.startsWith('sb-') || key.includes('supabase') || key.startsWith('binee_')) {
            sessionStorage.removeItem(key);
          }
        });
      } catch(e) {}

      // Step 3: Now that cookies are cleared, try to trim metadata in the
      // database so the NEXT sign-in produces a small JWT. This call should
      // succeed now that cookies are cleared (no more 494).
      // We fire-and-forget since the user needs to re-authenticate anyway.
      fetch('/api/auth/trim-metadata', { method: 'POST' }).catch(function() {});

      status.innerHTML = '<span class="done">Cleared ' + cleared + ' cookies. Redirecting to login...</span>';
      setTimeout(function() { window.location.href = '/login'; }, 1200);
    }

    // Auto-clear on page load - don't wait for user to click
    clearAll();
  </script>
</body>
</html>
